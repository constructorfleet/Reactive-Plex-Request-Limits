name: PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Lint, format, build, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Format
        run: ruff format --check .

      - name: Test
        run: python -m pytest -q

      - name: Build package
        run: python -m build

      - name: Build Docker image
        run: docker build -t request-shock:pr .
