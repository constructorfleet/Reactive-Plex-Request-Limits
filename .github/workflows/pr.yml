name: PR

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-label:
    name: Validate release label
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Collect PR labels
        id: labels
        uses: actions/github-script@v8
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(label => label.name).join(',');
            core.setOutput('labels', labels);

      - name: Validate labels
        env:
          PR_LABELS: ${{ steps.labels.outputs.labels }}
        run: uv run python -m tools.validate_release_labels --labels "$PR_LABELS"

  checks:
    name: Lint, format, build, test
    needs: validate-label
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check .

      - name: Test
        run: uv run python -m pytest -q

      - name: Post coverage report
        if: always() && github.event_name == 'pull_request' && hashFiles('coverage.md') != ''
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- request-shock-coverage-report -->';
            const coverage = fs.readFileSync('coverage.md', 'utf8');
            const body = `${marker}\n## Coverage Report\n\n${coverage}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Build package
        run: uv build

      - name: Build Docker image
        run: docker build -t request-shock:pr .
